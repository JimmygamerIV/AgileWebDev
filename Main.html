<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Main Page</title>
    <link rel="stylesheet" href="Main.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-group">
        <div class="nav-left">UWA Social Timetable</div>

        <div class="nav-center">
          <a href="#">Home</a>
          <a href="#">Friends</a>
          <a href="#">Add Event</a>
        </div>
      </div>

      <div class="nav-right">
        <a href="#">Logout</a>
      </div>
    </nav>

    <div class="main-container">
      <div class="sidebar">
        <div class="card welcome">
          <h3>Welcome, User!</h3>
        </div>

        <div class="card friends">
          <h3>Friends Online:</h3>
          <p>(Friends list here)</p>
        </div>
      </div>

      <div class="map-section">
        <div class="map-box">
          <p>Maze Map Here</p>

          <div class="upcoming">
            <div class="upcoming-header">
              <span>Upcoming Classes:</span>
              <button class="toggle-btn">▼</button>
            </div>

            <div class="upcoming-content">
              <p>Class 1</p>
              <p>Class 2</p>
              <p>Class 3</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
