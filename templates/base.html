<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}UWA Social Timetable{% endblock %}</title>

    <!-- ✅ Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Page-specific CSS --->
    {% block styles %}{% endblock %}

    <!-- Leaflet (only where needed) -->
    {% block leaflet %}{% endblock %}

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='base.css') }}"
    />
  </head>

  <body>
    {% if show_full_nav %}
    <nav class="navbar">
      <div class="nav-group">
        <div class="nav-left">UWA Social Timetable</div>

        <div class="nav-center">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('friends') }}">Friends</a>
          <a href="{{ url_for('add_event') }}">Add Event</a>
        </div>
      </div>

      <div class="nav-right">
        <!-- ✅ EXACT ORIGINAL logout behavior preserved -->
        <a href="#" onclick="logout()">Logout</a>

        <form
          id="logout-form"
          method="post"
          action="{{ url_for('auth.logout') }}"
          style="display: none"
        ></form>
      </div>
    </nav>
    {% else %}
    <nav class="navbar">
      <div class="nav-left">UWA Social Timetable</div>
    </nav>
    {% endif %} {% block content %}{% endblock %}

    <!-- Bootstrap JS (optional but safe) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}
    <script>
      function logout() {
        document.getElementById("logout-form").submit();
      }
    </script>
  </body>
</html>
