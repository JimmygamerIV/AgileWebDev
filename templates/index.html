<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main Page</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-group">
        <div class="nav-left">UWA Social Timetable</div>

        <div class="nav-center">
          <a href="/">Home</a>
          <a href="#">Friends</a>
          <a href="#">Add Event</a>
        </div>
      </div>

      <div class="nav-right">
        <a href="/signin">Logout</a>
      </div>
    </nav>

    <div class="main-container">
      <div class="sidebar">
        <div class="card welcome">
          <h3>Welcome, User!</h3>
        </div>

        <div class="card friends">
          <h3>Friends Online:</h3>
          <p>(Friends list here)</p>
        </div>
      </div>

      <div class="map-section">
        <div class="map-box">
          <button id="styleToggle" class="map-style-toggle">Switch to Default Style</button>
          <button
            id="fullscreenToggle"
            class="map-fullscreen-toggle"
            type="button"
            aria-label="Enter fullscreen map"
            title="Enter fullscreen"
          ></button>
          <div id="map" role="region" aria-label="UWA campus map"></div>

          <div class="upcoming">
            <div class="upcoming-header">
              <span>Upcoming Classes:</span>
              <button class="toggle-btn">▼</button>
            </div>

            <div class="upcoming-content">
              <p>Class 1</p>
              <p>Class 2</p>
              <p>Class 3</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
  </body>
</html>
