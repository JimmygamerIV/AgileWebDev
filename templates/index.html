<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Main Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-group">
        <div class="nav-left">UWA Social Timetable</div>

        <div class="nav-center">
          <a href="/">Home</a>
          <a href="/friends">Friends</a>
          <a href="/add-event">Add Event</a>
        </div>
      </div>

      <div class="nav-right">
        <form class="logout-form" method="post" action="/logout">
          <button class="logout-btn" type="submit">Logout</button>
        </form>
      </div>
    </nav>

    <div class="main-container">
      <div class="sidebar">
        <div class="card welcome">
          <h3>Welcome, {{ username }}</h3>
        </div>

        <div class="card friends">
          <h3>Friends On Campus:</h3>
          <p>(Friends list here)</p>
        </div>
      </div>

      <div class="map-section">
        <div class="map-box">
          <div id="map" style="width:100%; height:100%;"></div>
          <button id="styleToggle"></button>
          <button id="fullscreenToggle" title="Enter fullscreen">⛶</button>

          <div class="upcoming">
            <div class="upcoming-header">
              <span>Upcoming Classes:</span>
              <button class="toggle-btn">▼</button>
            </div>

            <div class="upcoming-content">
              {% for event in events %}
              <div class="event-item">
                <span class="event-name">{{ event.event_name }}</span>
                <span class="event-details">{{ event.date }} | {{ event.start_time }} - {{ event.end_time }}</span>
              </div>
              {% endfor %}
              
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
  </body>
</html>
