<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">UWA Social Timetable</div>
    </nav>

    <div class="container">
      <div class="card">
        <h1>Create your Account:</h1>
        <br />
        <form class="login-form">
          <label>Username</label>
          <input type="text" placeholder="eg. Michael Jones" />
          <label>Nickname</label>
          <input type="text" placeholder="eg. Mike" />
          <label>New Password</label>
          <input type="text" placeholder="Enter your New Password" />
          <label>Confirm New Password</label>
          <input type="text" placeholder="Confirm your New Password" />
          <label>UWA Student Email</label>
          <input type="email" placeholder="eg. Name@student.uwa.edu.au" />
          <br />
          <button type="submit">Sign Up</button>
          <p class="signup-text">
            Already have an account?
            <a href="/signin">Sign in here</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
