<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="{{url_for('static',filename='css/Signup.css')}}" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">UWA Social Timetable</div>
    </nav>

    <div class="container">
      <div class="card">
        <h1>Create your Account:</h1>
        <br />
        <form class="login-form" id= "login" method = "POST" action="/signup">
          <label>Username</label>
          <input type="text" name = "username" placeholder="eg. Michael Jones" />
          <label>Nickname</label>
          <input type="text" name = "nickname" placeholder="eg. Mike" />
          <label>New Password</label>
          <input type="password" name = "password" placeholder="Enter your New Password" />
          <label>Confirm New Password</label>
          <input type="password" name = "confirm_password" placeholder="Confirm your New Password" />
          <label>UWA Student Email</label>
          <input type="email" name = "email" placeholder="eg. Name@student.uwa.edu.au" />
          <br />
          <button type="submit">Sign Up</button>
          <p class="signup-text">
            Already have an account?
            <a href="{{url_for('signin_page')}}">Sign in here</a>
          </p>
        </form>
      </div>
    </div>
    <script src = "{{url_for('static',filename='js/signup.js')}}"></script>
  </body>
</html>
